
name: Deploy Porto App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /test/Porto

            echo "Pull latest code"
            git reset --hard
            git pull origin main

            echo "Backend setup"
            cd Porto_Backend
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart backend

            echo "Frontend setup"
            cd ../Frontend
            npm ci
            npm run build
            pm2 restart test